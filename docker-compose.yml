services:
  mcp-gateway:
    image: docker/mcp-gateway:latest
    restart: unless-stopped
    environment:
      DOCKER_MCP_IN_CONTAINER: "1"
      MCP_GATEWAY_AUTH_TOKEN: ${MCP_GATEWAY_AUTH_TOKEN}
    command:
      - --transport=sse
      - --port=9000
      - --servers=${MCP_GATEWAY_SERVERS}
    ports:
      - "${MCP_GATEWAY_PORT}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  agent-service:
    build:
      context: ./agent-service
    restart: unless-stopped
    depends_on:
      - mcp-gateway
    environment:
      LLM_MODEL_NAME: ${LLM_MODEL_NAME}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      MCP_GATEWAY_SSE_URL: http://mcp-gateway:${MCP_GATEWAY_PORT}/sse
      MCP_GATEWAY_AUTH_TOKEN: ${MCP_GATEWAY_AUTH_TOKEN}
      HOST: ${HOST}
      PORT: ${PORT}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "${PORT}:8000"
